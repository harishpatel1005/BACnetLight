name=BACnetLight
version=1.0.0
author=Harish Patel
maintainer=Harish Patel <harishpatel1005@gmail.com>
sentence=Lightweight BACnet/IP & BACnet/MSTP library for ESP32
paragraph=A minimal, memory-efficient BACnet server supporting BACnet/IP (UDP) and BACnet/MSTP (RS485). Features device discovery (WhoIs/IAm), ReadProperty, ReadPropertyMultiple, WriteProperty with priority arrays, COV subscriptions, and 6 object types (AI, AO, AV, BI, BO, BV). Designed for IoT gateways, HVAC controllers, and BACnet-enabled sensors.
category=Communication
url=https://github.com/harishpatel1005/BACnetLight
architectures=esp32
depends=Ethernet
